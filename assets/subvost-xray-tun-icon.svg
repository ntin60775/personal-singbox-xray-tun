<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="eyeBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1F2A3A"/>
      <stop offset="100%" stop-color="#0B1119"/>
    </radialGradient>
    <linearGradient id="irisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#eyeBg)"/>

  <g stroke="#EF4444" stroke-width="3" fill="none" opacity="0.8" filter="url(#redGlow)">
    <line x1="60" y1="256" x2="140" y2="256"/>
    <line x1="372" y1="256" x2="452" y2="256"/>
    <line x1="256" y1="60" x2="256" y2="140"/>
    <line x1="256" y1="372" x2="256" y2="452"/>
    <circle cx="256" cy="256" r="160" stroke-dasharray="10 15"/>
  </g>

  <ellipse cx="256" cy="256" rx="100" ry="70" fill="#FFFFFF" stroke="#4B5563" stroke-width="6"/>

  <g transform="translate(256, 256)">
    <circle cx="0" cy="0" r="50" fill="url(#irisGrad)"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6">
      <ellipse cx="0" cy="0" rx="50" ry="20"/>
      <ellipse cx="0" cy="0" rx="20" ry="50"/>
      <line x1="0" y1="-50" x2="0" y2="50"/>
      <line x1="-50" y1="0" x2="50" y2="0"/>
    </g>
    <circle cx="0" cy="0" r="18" fill="#1F2A3A" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M -8,-10 L 0,-16 L 8,-10 L 6,2 L -6,2 Z" fill="#EF4444" transform="scale(0.8)"/>
  </g>

  <ellipse cx="230" cy="230" rx="15" ry="8" fill="#FFFFFF" opacity="0.4" transform="rotate(-30, 230, 230)"/>
  <ellipse cx="270" cy="285" rx="6" ry="3" fill="#FFFFFF" opacity="0.2" transform="rotate(-30, 270, 285)"/>
</svg>
